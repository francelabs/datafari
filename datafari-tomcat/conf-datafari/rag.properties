# All parameters are documented in Datafari RagAPI Confluence documentation

##############################################
###        GLOBAL AI/RAG PROPERTIES        ###
##############################################

ai.enable.rag=false
ai.enable.agentic=false
ai.enable.summarization=false
ai.enable.synthesis=false


##############################################
###     DATAFARI ASSISTANT PARAMETERS      ###
##############################################

assistant.enable.assistant=false
assistant.enable.conversation.storage=true
assistant.retrieval.method=bm25


##############################################
###                AGENTIC                 ###
##############################################
agentic.enable.loop.control=false
agentic.loop.control.max.iterations=3
agentic.loop.control.min.score=0.8
agentic.loop.control.max.iterations.secondary=3
agentic.loop.control.min.score.secondary=0.6

##############################################
###       SUMMARIZATION & SYNTHESIS        ###
##############################################

synthesis.maxFiles=5
summarization.chunks.number=10

##############################################
###                RETRIEVAL               ###
##############################################

retrieval.method=bm25

##############################################
###         BM25 SEARCH PROPERTIES         ###
##############################################

chunking.maxFiles=3
chunking.chunk.size=8000
rag.operator=OR

##############################################
###         BM25 SEARCH PROPERTIES         ###
##############################################

rrf.topK=50
rrf.rank.constant=60

##############################################
###   IN MEMORY VECTOR SEARCH PROPERTIES   ###
###               DEPRECATED !             ###
##############################################

inMemory.enable.vector.search=false
inMemory.topK=10


##############################################
###               PROMPTING                ###
##############################################

# mapreduce or refine
prompt.chunking.strategy=refine
prompt.max.request.size=40000

##############################################
###              CHAT MEMORY               ###
##############################################
chat.query.rewriting.enabled.bm25=false
chat.query.rewriting.enabled.vector=false
chat.memory.enabled=false
chat.memory.history.size=6

##############################################
###           SOLR VECTOR SEARCH           ###
##############################################

solr.topK=10
rag.topK=10
solr.enable.ladr=true
solr.enable.acorn=true
solr.filtered.search.threshold=60

